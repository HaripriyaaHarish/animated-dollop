<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Sign Up | TuneBox</title>

    <link rel="stylesheet" href="signup.css">

</head>

<body>

    <div class="signup-container">

        <h1>Create Account</h1>

        <form>

            <div class="input-group">

                <label>Full Name</label>

                <input type="text" placeholder="Enter your name">

            </div>

            <div class="input-group">

                <label>Email</label>

                <input type="email" placeholder="Enter your email">

            </div>

            <div class="input-group">

                <label>Password</label>

                <input id="signupPass" type="password" placeholder="Create password">

            </div>

            <div class="input-group">

                <label>Confirm Password</label>

                <input id="signupUser" type="password" placeholder="Confirm password">

            </div>

            <button class="signup-btn" type="button" onclick="signup()">Sign Up</button>

        </form>

        <div class="login-link">

            Already have an account?

            <a href="login.html">Login</a>

        </div>

    </div>
    <script src="signup.js"></script>
</body>

</html>
