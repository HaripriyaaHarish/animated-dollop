<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login | TuneBox</title>

    <link rel="stylesheet" href="login.css">

</head>

<body>

    <div class="login-container">

        <h1>Welcome Back</h1>

        <form>

            <div class="input-group">

                <label>Username</label>

                <input id="loginUser" type="username" placeholder="Enter your username">

            </div>

            <div class="input-group">

                <label>Password</label>

                <input id="loginPass" type="password" placeholder="Enter your password">

            </div>

            <button class="login-btn" onclick="login(event)">Login</button>

        </form>

        <div class="signup-link">

            Don't have an account?

            <a href="signup.html">Sign Up</a>

        </div>

    </div>
    <script src="login.js"></script>
</body>

</html>
